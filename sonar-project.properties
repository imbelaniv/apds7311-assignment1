# SonarCloud project configuration
# Sign up at https://sonarcloud.io, create a project, and set SONAR_TOKEN in CircleCI

sonar.projectKey=apds7311-payments
sonar.projectName=APDS7311 International Payments Portal
sonar.projectVersion=1.0

# Source directories to analyse
sonar.sources=backend,frontend/src,employee-portal/src

# Exclude generated files, secrets, and build output
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/ssl/**,\
  **/coverage/**,\
  backend/scripts/**

# Test files
sonar.tests=backend/tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Coverage report path (generated by jest --coverage)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
sonar.coverage.exclusions=**/node_modules/**,backend/scripts/**,**/ssl/**

# Language settings
sonar.language=js
sonar.sourceEncoding=UTF-8
