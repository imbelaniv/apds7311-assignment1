version: 2.1

orbs:
  node: circleci/node@5.1.0
  sonarcloud: sonarsource/sonarcloud@2.0.0

jobs:
  test-and-audit:
    docker:
      - image: cimg/node:20.11
        environment:
          JWT_SECRET: ci_test_secret_key
          JWT_EXPIRES_IN: 1h
          CUSTOMER_ORIGIN: http://localhost:5173
          EMPLOYEE_ORIGIN: http://localhost:5174
    steps:
      - checkout

      - node/install-packages:
          pkg-manager: npm
          app-dir: backend

      - run:
          name: Run API tests
          command: cd backend && npm test

      - run:
          name: Dependency vulnerability scan
          command: cd backend && npm audit --audit-level=moderate

      - store_test_results:
          path: backend/test-results

  sonar-scan:
    docker:
      - image: cimg/node:20.11
    steps:
      - checkout
      - sonarcloud/scan

workflows:
  build-test-scan:
    jobs:
      - test-and-audit
      - sonar-scan:
          context: SonarCloud
          requires:
            - test-and-audit
